[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/course/module"
  to = "/course/module.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
